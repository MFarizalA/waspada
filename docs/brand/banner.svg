<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" role="img" aria-label="WASPADA social banner — early warning, argued">
  <!-- 1500x500 (X/LinkedIn-style header). Safe zone kept center-left. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0.35">
      <stop offset="0" stop-color="#006eff"/>
      <stop offset="0.55" stop-color="#0052d9"/>
      <stop offset="1" stop-color="#002a86"/>
    </linearGradient>
    <linearGradient id="seam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00a3ff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#00a3ff"/>
      <stop offset="1" stop-color="#00a3ff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1500" height="500" fill="url(#bg)"/>

  <!-- oversized ghost ladder, right side — the alert-level motif as texture -->
  <g stroke="#ffffff" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M1090 200 L1250 96 L1410 200" stroke-opacity="0.10" stroke-width="40"/>
    <path d="M1074 340 L1250 226 L1426 340" stroke-opacity="0.22" stroke-width="56"/>
    <path d="M1090 468 L1250 364 L1410 468" stroke-opacity="0.10" stroke-width="40"/>
  </g>

  <!-- mark tile -->
  <g transform="translate(96 130)">
    <rect width="240" height="240" rx="49" fill="#ffffff" fill-opacity="0.10"/>
    <rect x="4" y="4" width="232" height="232" rx="46" fill="none" stroke="#00a3ff" stroke-opacity="0.55" stroke-width="2"/>
    <g transform="translate(120 120)" stroke="#ffffff" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M-46 -24 L0 -54 L46 -24" stroke-opacity="0.32" stroke-width="15"/>
      <path d="M-51 20 L0 -12 L51 20" stroke-width="21"/>
      <path d="M-46 62 L0 32 L46 62" stroke-opacity="0.32" stroke-width="15"/>
    </g>
  </g>

  <!-- wordmark + copy -->
  <g font-family="Segoe UI, Arial, Helvetica, sans-serif" fill="#ffffff">
    <text x="392" y="238" font-weight="700" font-size="96" letter-spacing="10">WASPADA</text>
    <text x="396" y="298" font-weight="600" font-size="30" fill-opacity="0.92">Early warning, argued.</text>
    <text x="396" y="348" font-size="24" fill-opacity="0.72">Six AI agents debate every loan-risk score — a human holds the gate.</text>
  </g>

  <!-- sky seam along the base, echoing the app banner -->
  <rect x="0" y="494" width="1500" height="6" fill="url(#seam)"/>
</svg>
