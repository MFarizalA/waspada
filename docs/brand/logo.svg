<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="WASPADA logo — alert-level beacon, second tier lit">
  <!-- Direction A "Alert Level": Normal → WASPADA → Siaga → Awas.
       Three chevron tiers; the SECOND is lit — you are at Waspada,
       the level where you start watching. -->
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#006eff"/>
      <stop offset="0.55" stop-color="#0052d9"/>
      <stop offset="1" stop-color="#003cb3"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="104" fill="url(#tile)"/>
  <!-- top tier (above us) — dim -->
  <path d="M156 210 L256 146 L356 210" fill="none" stroke="#ffffff" stroke-opacity="0.32"
        stroke-width="34" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- second tier — LIT (Waspada) -->
  <path d="M146 306 L256 236 L366 306" fill="none" stroke="#ffffff"
        stroke-width="46" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- base tier — dim -->
  <path d="M156 396 L256 332 L356 396" fill="none" stroke="#ffffff" stroke-opacity="0.32"
        stroke-width="34" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
