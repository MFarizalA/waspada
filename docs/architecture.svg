<svg xmlns="http://www.w3.org/2000/svg" width="980" height="720" viewBox="0 0 980 720" font-family="Segoe UI, Arial, sans-serif">
  <!-- WASPADA architecture — editable source (SVG). Renders inline on GitHub. -->
  <rect x="0" y="0" width="980" height="720" fill="#ffffff"/>
  <text x="490" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#1a2b45">WASPADA — Agent-Society Loan-Risk Triage on Alibaba Cloud</text>
  <text x="490" y="54" text-anchor="middle" font-size="13" fill="#5b6b82">Track 3 · Agent Society — a bounded, evidence-grounded debate over the riskiest accounts</text>

  <!-- ===== Qwen Cloud band ===== -->
  <rect x="40" y="76" width="900" height="86" rx="12" fill="#eef4ff" stroke="#3b6fd6" stroke-width="1.5"/>
  <text x="60" y="100" font-size="15" font-weight="700" fill="#24457f">Qwen Cloud · DashScope (OpenAI-compatible endpoint)</text>
  <rect x="60" y="112" width="270" height="38" rx="8" fill="#ffffff" stroke="#7aa0e0"/>
  <text x="72" y="130" font-size="12.5" font-weight="600" fill="#24457f">qwen3.7-flash</text>
  <text x="72" y="145" font-size="11" fill="#5b6b82">Data Engineer · Risk Auditor</text>
  <rect x="352" y="112" width="270" height="38" rx="8" fill="#ffffff" stroke="#7aa0e0"/>
  <text x="364" y="130" font-size="12.5" font-weight="600" fill="#24457f">qwen3.7-plus</text>
  <text x="364" y="145" font-size="11" fill="#5b6b82">Data Analyst · Actuary (defense)</text>
  <rect x="644" y="112" width="276" height="38" rx="8" fill="#ffffff" stroke="#7aa0e0"/>
  <text x="656" y="130" font-size="12.5" font-weight="600" fill="#24457f">qwen3.7-max</text>
  <text x="656" y="145" font-size="11" fill="#5b6b82">Credit Arbiter (rulings)</text>

  <!-- ===== Function Compute (society) ===== -->
  <rect x="40" y="196" width="900" height="300" rx="12" fill="#f4faf5" stroke="#2e9e57" stroke-width="1.5"/>
  <text x="60" y="220" font-size="15" font-weight="700" fill="#1e6e3c">Alibaba Function Compute · FastAPI (api.main) — the 6-agent society</text>
  <text x="60" y="238" font-size="11.5" fill="#5b6b82">Orchestrator coordinates the pipeline; native function-calling loops; human approval gate before release</text>

  <!-- agent pipeline -->
  <g font-size="12" font-weight="600">
    <rect x="60" y="256" width="132" height="58" rx="8" fill="#ffffff" stroke="#2e9e57"/>
    <text x="126" y="280" text-anchor="middle" fill="#1e6e3c">Data Engineer</text>
    <text x="126" y="298" text-anchor="middle" font-size="10.5" font-weight="400" fill="#5b6b82">validate · profile</text>

    <rect x="212" y="256" width="132" height="58" rx="8" fill="#ffffff" stroke="#2e9e57"/>
    <text x="278" y="280" text-anchor="middle" fill="#1e6e3c">Data Analyst</text>
    <text x="278" y="298" text-anchor="middle" font-size="10.5" font-weight="400" fill="#5b6b82">features · aggregates</text>

    <rect x="364" y="256" width="132" height="58" rx="8" fill="#ffffff" stroke="#2e9e57"/>
    <text x="430" y="280" text-anchor="middle" fill="#1e6e3c">Actuary</text>
    <text x="430" y="298" text-anchor="middle" font-size="10.5" font-weight="400" fill="#5b6b82">sklearn score + defense</text>

    <rect x="516" y="256" width="132" height="58" rx="8" fill="#ffffff" stroke="#2e9e57"/>
    <text x="582" y="280" text-anchor="middle" fill="#1e6e3c">Risk Auditor</text>
    <text x="582" y="298" text-anchor="middle" font-size="10.5" font-weight="400" fill="#5b6b82">challenges the score</text>

    <rect x="668" y="256" width="132" height="58" rx="8" fill="#ffffff" stroke="#2e9e57"/>
    <text x="734" y="280" text-anchor="middle" fill="#1e6e3c">Credit Arbiter</text>
    <text x="734" y="298" text-anchor="middle" font-size="10.5" font-weight="400" fill="#5b6b82">rules disputes</text>

    <rect x="820" y="256" width="100" height="58" rx="8" fill="#ffffff" stroke="#2e9e57"/>
    <text x="870" y="280" text-anchor="middle" fill="#1e6e3c">Insight</text>
    <text x="870" y="298" text-anchor="middle" font-size="10.5" font-weight="400" fill="#5b6b82">work-list</text>
  </g>
  <!-- pipeline arrows -->
  <g stroke="#2e9e57" stroke-width="1.5" fill="none" marker-end="url(#agr)">
    <line x1="192" y1="285" x2="210" y2="285"/>
    <line x1="344" y1="285" x2="362" y2="285"/>
    <line x1="496" y1="285" x2="514" y2="285"/>
    <line x1="648" y1="285" x2="666" y2="285"/>
    <line x1="800" y1="285" x2="818" y2="285"/>
  </g>

  <!-- debate box -->
  <rect x="364" y="336" width="436" height="66" rx="8" fill="#fdf6e3" stroke="#d99a2b" stroke-width="1.3"/>
  <text x="582" y="358" text-anchor="middle" font-size="12.5" font-weight="700" fill="#8a5a12">Bounded debate (≤ K×3 rounds)</text>
  <text x="582" y="376" text-anchor="middle" font-size="11" fill="#7a5b2a">Auditor challenge → Actuary rebuttal → Arbiter ruling</text>
  <text x="582" y="392" text-anchor="middle" font-size="11" fill="#7a5b2a">evidence cited via MCP · 4 terminal resolutions · escalate to human gate</text>

  <!-- MCP + gate chips -->
  <rect x="60" y="336" width="150" height="66" rx="8" fill="#ffffff" stroke="#2e9e57"/>
  <text x="135" y="360" text-anchor="middle" font-size="12" font-weight="600" fill="#1e6e3c">MCP tools</text>
  <text x="135" y="378" text-anchor="middle" font-size="10.5" fill="#5b6b82">portfolio_stats</text>
  <text x="135" y="392" text-anchor="middle" font-size="10.5" fill="#5b6b82">lookup_account</text>
  <rect x="820" y="336" width="100" height="66" rx="8" fill="#ffffff" stroke="#b0453b"/>
  <text x="870" y="363" text-anchor="middle" font-size="12" font-weight="600" fill="#9a3b32">Human gate</text>
  <text x="870" y="381" text-anchor="middle" font-size="10.5" fill="#5b6b82">approve /</text>
  <text x="870" y="394" text-anchor="middle" font-size="10.5" fill="#5b6b82">de-escalate</text>

  <!-- Qwen <-> FC arrow -->
  <line x1="490" y1="162" x2="490" y2="196" stroke="#3b6fd6" stroke-width="1.6" marker-end="url(#blu)" marker-start="url(#blus)"/>
  <text x="500" y="184" font-size="10.5" fill="#3b6fd6">tool-calling loops</text>

  <!-- ===== Data + infra row ===== -->
  <!-- OSS -->
  <rect x="40" y="524" width="250" height="120" rx="12" fill="#fef6ee" stroke="#e07b2e" stroke-width="1.5"/>
  <text x="60" y="548" font-size="14" font-weight="700" fill="#b5591a">OSS · medallion (Parquet)</text>
  <rect x="60" y="560" width="66" height="34" rx="6" fill="#ffffff" stroke="#e6a06a"/><text x="93" y="581" text-anchor="middle" font-size="11" fill="#b5591a">Raw</text>
  <rect x="132" y="560" width="66" height="34" rx="6" fill="#ffffff" stroke="#e6a06a"/><text x="165" y="581" text-anchor="middle" font-size="11" fill="#b5591a">Staging</text>
  <rect x="204" y="560" width="66" height="34" rx="6" fill="#ffffff" stroke="#e6a06a"/><text x="237" y="581" text-anchor="middle" font-size="11" fill="#b5591a">Mart</text>
  <text x="60" y="616" font-size="10.5" fill="#7a6a5a">loan book read into in-process DuckDB</text>
  <text x="60" y="631" font-size="10.5" fill="#7a6a5a">(Data Engineer runs SQL quality checks)</text>

  <!-- RDS -->
  <rect x="310" y="524" width="180" height="120" rx="12" fill="#f0f0fb" stroke="#6a5acd" stroke-width="1.5"/>
  <text x="330" y="548" font-size="14" font-weight="700" fill="#4b3fae">RDS MySQL</text>
  <text x="330" y="570" font-size="11.5" fill="#5b6b82">auth store only</text>
  <text x="330" y="588" font-size="11" fill="#7a7a9a">JWT users · bcrypt</text>
  <text x="330" y="606" font-size="11" fill="#7a7a9a">(not a lakehouse</text>
  <text x="330" y="621" font-size="11" fill="#7a7a9a">component)</text>

  <!-- SLS -->
  <rect x="510" y="524" width="180" height="120" rx="12" fill="#eefbf7" stroke="#199e86" stroke-width="1.5"/>
  <text x="530" y="548" font-size="14" font-weight="700" fill="#0f7d6a">SLS · audit</text>
  <text x="530" y="570" font-size="11.5" fill="#5b6b82">every run's step log</text>
  <text x="530" y="588" font-size="11" fill="#7a7a9a">fail-safe → local</text>
  <text x="530" y="606" font-size="11" fill="#7a7a9a">JSONL fallback</text>

  <!-- Dashboard -->
  <rect x="710" y="524" width="230" height="120" rx="12" fill="#f5f0fb" stroke="#9b4dca" stroke-width="1.5"/>
  <text x="730" y="548" font-size="14" font-weight="700" fill="#7a2fa8">React Dashboard</text>
  <text x="730" y="570" font-size="11.5" fill="#5b6b82">EWS + Agent-Society panel</text>
  <text x="730" y="588" font-size="11" fill="#7a7a9a">live debate via SSE</text>
  <text x="730" y="606" font-size="11" fill="#7a7a9a">served by FC · app.waspada.xyz</text>
  <text x="730" y="624" font-size="11" fill="#7a7a9a">bilingual EN / 中文</text>

  <!-- infra arrows from FC -->
  <g stroke="#8a97a8" stroke-width="1.4" fill="none" marker-end="url(#gry)">
    <line x1="165" y1="496" x2="165" y2="522"/>
    <line x1="400" y1="496" x2="400" y2="522"/>
    <line x1="600" y1="496" x2="600" y2="522"/>
    <line x1="820" y1="496" x2="820" y2="522"/>
  </g>

  <!-- Deploy flow (ACR -> FC) -->
  <rect x="40" y="664" width="900" height="40" rx="10" fill="#f7f7f9" stroke="#b6bec9" stroke-dasharray="5 4"/>
  <text x="60" y="689" font-size="12" font-weight="600" fill="#48566a">Deploy:</text>
  <text x="120" y="689" font-size="12" fill="#5b6b82">Docker build (linux/amd64) → ACR (Container Registry) → Function Compute custom container · IaC by OpenTofu (deploy/iac/main.tf)</text>

  <defs>
    <marker id="agr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#2e9e57"/></marker>
    <marker id="gry" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#8a97a8"/></marker>
    <marker id="blu" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#3b6fd6"/></marker>
    <marker id="blus" markerWidth="8" markerHeight="8" refX="2" refY="3" orient="auto"><path d="M6,0 L0,3 L6,6 Z" fill="#3b6fd6"/></marker>
  </defs>
</svg>
